services:
  app:
    image: erke312/express-node-app:latest
    ports:
      - 8080:8080
  watchtower:
    image: nickfedor/watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower